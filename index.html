<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三麗鷗中毒日記</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono&display=swap');

:root {
  --bg: #fff5f7;
  --surface: #ffffff;
  --surface2: #fff0f3;
  --border: #f0d0da;
  --accent: #e8608a;
  --accent2: #f9b8cb;
  --accent-dark: #c0325c;
  --text: #3a2030;
  --text2: #8a607a;
  --text3: #c0a0b0;
  --radius: 12px;
  --sans: 'Noto Sans TC', sans-serif;
  --serif: 'Playfair Display', serif;
  --mono: 'DM Mono', monospace;
  --header-h: 0px; /* JS will set this */
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); overflow-y: scroll; }

/* ── 防護：圖片不可選取、不可拖曳 ── */
img {
  -webkit-user-drag: none;
  user-drag: none;
  -webkit-user-select: none;
  user-select: none;
  pointer-events: none; /* 停用所有滑鼠事件（含右鍵）*/
}
/* 但按鈕和互動元素的圖片要恢復 pointer-events */
button img, a img, .cf-btn img { pointer-events: auto; }

/* 整體文字防選取（可選：讓瀏覽體驗更完整可拿掉） */
.gallery, .card, .img-wrap {
  -webkit-user-select: none;
  user-select: none;
}

/* ════════════════════════════════════════
   FIXED HEADER WRAPPER
   包含 Hero + 搜尋列 + 分類列，全部固定在頂部
   ════════════════════════════════════════ */
#fixed-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: var(--bg);
  box-shadow: 0 2px 12px rgba(232,96,138,0.08);
}

/* ── Hero / Logo ── */
.hero {
  background: #fce8ef;
  border-bottom: 2px solid #f9b8cb;
  width: 100%;
  overflow: hidden;
}
.hero-logo-img {
  display: block;
  width: 100%;
  /* 關鍵：用 aspect-ratio 讓圖片等比例縮放，不裁切 */
  height: auto;
  max-height: 260px;
  object-fit: contain;
  object-position: center center;
  background: #fce8ef;
}
@media (max-width: 900px)  { .hero-logo-img { max-height: 180px; } }
@media (max-width: 600px)  { .hero-logo-img { max-height: 120px; } }
@media (max-width: 400px)  { .hero-logo-img { max-height: 90px;  } }

/* ── Search Bar ── */
.sticky-bar {
  background: rgba(255,245,247,0.97);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  overflow: visible;
}
.sticky-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 8px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: nowrap;
  overflow: visible; /* 允許跳動字元超出邊界 */
}
.search-wrap { position: relative; flex: 1; max-width: 320px; min-width: 120px; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
#searchInput {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px 8px 32px;
  font-family: var(--sans);
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
#searchInput:focus { border-color: var(--accent); background: #fff; }
#searchInput::placeholder { color: var(--text3); }

/* ── 標語容器 ── */
.shop-slogan-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 0;
  /* 不能用 overflow:hidden，會裁掉打字機/跳動效果 */
  overflow: visible;
  position: relative;
}
@media (max-width: 500px) { .shop-slogan-wrap { display: none; } }

/* ── Style A: 彩虹漸層流動 ── */
.slogan-style-a {
  font-weight: 700; font-style: italic;
  background: linear-gradient(90deg,#ff6b9d,#ff9a3c,#ffd93d,#6bcb77,#4d96ff,#c77dff);
  background-size: 300% 100%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: rainbow-flow 3s linear infinite;
  white-space: nowrap;
  display: inline-block;
}
@keyframes rainbow-flow { 0%{background-position:0%} 100%{background-position:300%} }

/* ── Style B: LED 跑馬燈 ── */
.slogan-style-b-wrap {
  width: 100%;
  overflow: hidden;
  background: #1a0a0a;
  border-radius: 5px;
  padding: 5px 0;
  max-width: 100%;
}
.slogan-style-b-track {
  display: flex;
  white-space: nowrap;
  animation: marquee-scroll 14s linear infinite;
  will-change: transform;
}
.slogan-style-b-text {
  font-family: 'Courier New', monospace;
  font-weight: 700;
  padding-right: 60px;
  letter-spacing: 0.08em;
  flex-shrink: 0;
}
@keyframes marquee-scroll { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }

/* ── Style C: 打字機效果 ── */
.slogan-style-c {
  font-weight: 600;
  font-style: italic;
  white-space: nowrap;
  overflow: hidden;
  display: inline-block;
  max-width: 100%;
  letter-spacing: 0.04em;
  /* 打字機：width 從 0 擴展到最大寬度 */
  animation: typing-cursor 0.7s step-end infinite;
  border-right: 2.5px solid currentColor;
}
/* 先讓文字完整顯示，用 clip-path 做打字機效果 */
.slogan-style-c-wrap {
  display: inline-flex;
  overflow: hidden;
  white-space: nowrap;
  animation: typing-expand 3.5s steps(30, end) infinite alternate;
  max-width: 100%;
}
@keyframes typing-expand {
  0%   { max-width: 0; }
  60%, 100% { max-width: 100%; }
}
@keyframes typing-cursor {
  0%, 100% { border-color: currentColor; }
  50%       { border-color: transparent; }
}

/* ── Style D: 逐字彩色跳動 ── */
.slogan-style-d {
  display: inline-flex;
  align-items: center;
  white-space: nowrap;
  overflow: visible;
}
.slogan-style-d span {
  display: inline-block;
  font-weight: 700;
  animation: char-bounce 1.2s ease-in-out infinite;
  will-change: transform;
}
@keyframes char-bounce {
  0%,100% { transform: translateY(0); }
  50%     { transform: translateY(-6px); }
}

/* ── Style E: 霓虹閃爍 ── */
.slogan-style-e {
  font-weight: 700;
  letter-spacing: 0.06em;
  animation: neon-pulse 2.5s ease-in-out infinite;
  white-space: nowrap;
  display: inline-block;
}
.slogan-style-e .spin-icon {
  animation: icon-spin 3s linear infinite;
  display: inline-block;
}
@keyframes neon-pulse {
  0%,100% { opacity: 1; filter: brightness(1); }
  50%     { opacity: 0.85; filter: brightness(1.4); }
}
@keyframes icon-spin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

/* ── Style F: 波浪彩色跳動 ── */
.slogan-style-f {
  display: inline-flex;
  align-items: center;
  white-space: nowrap;
  overflow: visible;
}
.slogan-style-f span {
  display: inline-block;
  font-weight: 700;
  animation: wave-dance 2s ease-in-out infinite;
  will-change: transform;
}
@keyframes wave-dance {
  0%,100% { transform: translateY(0); filter: hue-rotate(0deg); }
  25%     { transform: translateY(-5px); filter: hue-rotate(90deg); }
  75%     { transform: translateY(-5px); filter: hue-rotate(270deg); }
}

.count-info {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text2);
  white-space: nowrap;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  flex-shrink: 0;
  margin-left: auto;        /* 靠最右邊 */
}
@media (max-width: 400px) { .count-info { display: none; } }

/* ── Category Tabs ── */
.cat-scroll {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.cat-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 16px;
  display: flex;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.cat-inner::-webkit-scrollbar { display: none; }
.cat-tab {
  flex-shrink: 0;
  padding: 11px 16px;
  font-family: var(--sans);
  font-size: 13px;
  color: var(--text2);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 5px;
}
.cat-tab:hover { color: var(--accent); }
.cat-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
.cat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* ════════════════════════════════════════
   商品區：用 padding-top 讓出固定 header 的空間
   JS 會動態計算 header 實際高度並設定 padding-top
   ════════════════════════════════════════ */
#gallery-section {
  padding-top: var(--header-h, 380px); /* fallback - JS 會動態更新 */
}
.gallery-wrap {
  max-width: 1400px;
  margin: 0 auto;
  padding: 16px 16px 120px;
}

/* ── Gallery Grid ── */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(var(--card-min,130px), 1fr));
  gap: 10px;
}

/* ── Product Card ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: visible;
  cursor: pointer;
  position: relative;
  transition: z-index 0s;
}
.card:hover { z-index: 10; }

.img-wrap {
  position: relative;
  overflow: hidden;
  aspect-ratio: 1;
  background: var(--surface2);
  border-radius: 9px 9px 0 0;
}
.img-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.4s cubic-bezier(0.34,1.2,0.64,1);
}
.card:hover .img-wrap img { transform: scale(1.15); }
.card:hover {
  box-shadow: 0 12px 36px rgba(232,96,138,0.22), 0 0 0 2px var(--accent);
  border-color: var(--accent);
  transform: translateY(-4px) scale(1.06);
  transition: transform 0.3s cubic-bezier(0.34,1.4,0.64,1), box-shadow 0.3s, border-color 0.2s;
}

.skeleton {
  position: absolute; inset: 0;
  background: linear-gradient(90deg, var(--surface2) 25%, #ffe0ea 50%, var(--surface2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 9px 9px 0 0;
}
.img-loaded .skeleton { display: none; }
@keyframes shimmer { 0%{background-position:200%} 100%{background-position:-200%} }

.overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(200,50,100,0.55) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.2s;
  display: flex; align-items: flex-end; justify-content: center;
  padding-bottom: 8px;
  border-radius: 9px 9px 0 0;
}
.card:hover .overlay { opacity: 1; }
.overlay-hint {
  background: rgba(255,255,255,0.9);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 11px;
  color: var(--accent-dark);
  font-weight: 500;
  pointer-events: none;
}

.card-info { padding: 6px 8px 8px; }
.card-id { font-family: var(--mono); font-size: 9px; color: var(--text3); }
.card-name { font-size: 11px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 1px 0 4px; color: var(--text); }
.card-cat-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 9px; padding: 1px 6px; border-radius: 4px; font-weight: 500; }

/* ── Empty State ── */
.state-empty { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--text3); }
.state-empty .icon { font-size: 3rem; margin-bottom: 12px; }
.state-empty p { font-size: 14px; margin-bottom: 6px; }
.state-empty small { font-size: 12px; }

/* ── Load More ── */
.load-more-wrap { text-align: center; margin-top: 32px; }
#loadMoreBtn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 36px;
  background: transparent;
  border: 1.5px solid var(--accent);
  border-radius: 8px;
  color: var(--accent);
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
#loadMoreBtn:hover { background: var(--accent); color: #fff; }

/* ── Lightbox ── */
#lightbox {
  display: none;
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(20,16,14,0.96);
  backdrop-filter: blur(10px);
  align-items: center; justify-content: center;
}
#lightbox.open { display: flex; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.lb-counter { position: fixed; top: 18px; left: 50%; transform: translateX(-50%); font-family: var(--mono); font-size: 12px; color: rgba(255,255,255,.35); background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); border-radius: 20px; padding: 4px 14px; }
.lb-wrap { position: relative; max-width: min(88vw,860px); display: flex; flex-direction: column; align-items: center; gap: 14px; }
#lbImg { max-width: 100%; max-height: 72vh; object-fit: contain; border-radius: 12px; border: 1px solid rgba(255,255,255,.08); animation: zoomIn .28s cubic-bezier(.34,1.56,.64,1); }
@keyframes zoomIn { from{transform:scale(.88);opacity:0} to{transform:scale(1);opacity:1} }
.lb-info { text-align: center; }
.lb-id { font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,.3); margin-bottom: 4px; }
.lb-name { font-family: var(--serif); font-size: 1.3rem; color: #f5f0ea; margin-bottom: 4px; }
.lb-cat { font-size: 12px; color: var(--accent2); letter-spacing: .06em; }
.lb-nav { position: fixed; top: 50%; transform: translateY(-50%); width: 46px; height: 46px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-size: 20px; transition: all .18s; backdrop-filter: blur(4px); }
.lb-nav:hover { background: var(--accent); border-color: var(--accent); }
#lbPrev { left: 20px; }
#lbNext { right: 20px; }
.lb-close { position: fixed; top: 18px; right: 20px; width: 38px; height: 38px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-size: 20px; transition: background .15s; }
.lb-close:hover { background: #c04040; border-color: #c04040; }

/* ── No Config ── */
.no-config { max-width: 500px; margin: 80px auto; text-align: center; padding: 48px 32px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; }
.no-config .icon { font-size: 3rem; margin-bottom: 16px; }
.no-config h2 { font-family: var(--serif); font-size: 1.5rem; margin-bottom: 8px; }
.no-config p { font-size: 13px; color: var(--text2); margin-bottom: 20px; line-height: 1.7; }
.no-config a { display: inline-flex; align-items: center; gap: 6px; padding: 11px 24px; background: var(--accent); color: #fff; border-radius: 8px; font-size: 13px; font-weight: 500; text-decoration: none; transition: background .15s; }
.no-config a:hover { background: var(--accent-dark); }

/* ── Scroll to top ── */
#toTop {
  position: fixed; bottom: 90px; right: 20px;
  width: 40px; height: 40px;
  background: var(--accent); border: none; border-radius: 50%;
  color: #fff; font-size: 18px; cursor: pointer;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
  display: flex; align-items: center; justify-content: center;
  z-index: 99;
  box-shadow: 0 4px 14px rgba(232,96,138,0.4);
}
#toTop.show { opacity: 1; pointer-events: all; }

/* ══ 浮動聯絡按鈕群組（右下角固定） ══ */
#contact-float {
  position: fixed !important;
  bottom: 24px !important;
  right: 20px !important;
  left: auto !important;
  top: auto !important;
  z-index: 9999 !important;
  display: flex !important;
  flex-direction: column-reverse;
  align-items: flex-end;
  gap: 10px;
  pointer-events: none;
}
.cf-btn {
  width: 50px; height: 50px;
  border-radius: 50%;
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 14px rgba(0,0,0,.25);
  transition: transform 0.2s, box-shadow 0.2s;
  position: relative;
  flex-shrink: 0;
  pointer-events: all !important;
}
.cf-btn:hover { transform: scale(1.12) !important; }
.cf-btn svg, .cf-btn img { width: 26px !important; height: 26px !important; pointer-events: none; }
.cf-tooltip {
  position: absolute;
  right: 58px; top: 50%; transform: translateY(-50%);
  background: rgba(30,20,25,.85);
  color: #fff; font-size: 11px; font-weight: 600;
  padding: 4px 10px; border-radius: 8px;
  white-space: nowrap; pointer-events: none;
  opacity: 0; transition: opacity 0.15s;
  font-family: var(--sans);
}
.cf-btn:hover .cf-tooltip { opacity: 1; }
.cf-line  { background: #06C755; }
.cf-fb    { background: #1877F2; }
.cf-ig    { background: linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888); }
.cf-wa    { background: #25D366; }
.cf-email { background: #ea4335; }
.cf-ai    { background: linear-gradient(135deg,#667eea,#764ba2); }

/* 通用 Modal 底層 */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 10000;
  background: rgba(0,0,0,.55); backdrop-filter: blur(6px);
  align-items: center; justify-content: center;
}
.modal-overlay.open { display: flex; animation: fadeIn .2s ease; }
.modal-box {
  background: #fff; border-radius: 20px;
  width: 320px; max-width: 94vw;
  box-shadow: 0 24px 60px rgba(0,0,0,.3);
  position: relative; overflow: hidden;
}
.modal-close-btn {
  position: absolute; top: 12px; right: 14px;
  background: none; border: none; font-size: 24px;
  color: #bbb; cursor: pointer; line-height: 1; z-index: 1;
}
.modal-qr-body { padding: 28px 24px; text-align: center; }
.modal-qr-icon { font-size: 2.2rem; margin-bottom: 6px; }
.modal-qr-title { font-size: 17px; font-weight: 700; margin-bottom: 3px; }
.modal-qr-sub { font-size: 12px; color: #888; margin-bottom: 14px; }
.modal-qr-img { width: 170px; height: 170px; object-fit: contain; border-radius: 12px; border: 3px solid currentColor; display: block; margin: 0 auto 14px; }
.modal-cta-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 12px; border-radius: 10px;
  font-size: 14px; font-weight: 700; cursor: pointer; border: none;
  font-family: var(--sans); color: #fff; transition: filter .15s;
}
.modal-cta-btn:hover { filter: brightness(.9); }
.modal-hint { font-size: 11px; color: #aaa; margin-top: 10px; }

/* AI 聊天 modal */
.ai-modal-box { width: 360px; max-width: 96vw; display: flex; flex-direction: column; }
.ai-header {
  padding: 14px 18px;
  background: linear-gradient(135deg,#667eea,#764ba2);
  color: #fff; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
}
.ai-header-avatar {
  width: 38px; height: 38px; border-radius: 50%;
  background: rgba(255,255,255,.2);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
}
.ai-header-info { flex: 1; }
.ai-header-name { font-size: 15px; font-weight: 700; }
.ai-header-sub { font-size: 11px; opacity: .75; }
.ai-close { background: none; border: none; color: #fff; font-size: 22px; cursor: pointer; opacity: .8; padding: 0; }
.ai-msgs {
  flex: 1; overflow-y: auto; padding: 14px;
  display: flex; flex-direction: column; gap: 10px;
  background: #f8f5fb; min-height: 200px; max-height: 340px;
}
.ai-bubble {
  max-width: 84%; padding: 9px 13px;
  border-radius: 16px; font-size: 13px; line-height: 1.55; word-break: break-word;
}
.ai-bubble.bot {
  background: #fff; color: #333;
  border-radius: 4px 16px 16px 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,.08); align-self: flex-start;
}
.ai-bubble.user {
  background: linear-gradient(135deg,#667eea,#764ba2);
  color: #fff; align-self: flex-end;
  border-radius: 16px 16px 4px 16px;
}
.ai-bubble.typing { opacity: .6; font-style: italic; align-self: flex-start; }
.ai-quick-btns {
  padding: 8px 12px; display: flex; gap: 6px; flex-wrap: wrap;
  background: #f8f5fb; border-top: 1px solid #ede8f5; flex-shrink: 0;
}
.ai-quick-btn {
  padding: 5px 11px; border-radius: 16px; font-size: 11px;
  border: 1px solid #c4b5e8; background: #fff; color: #764ba2;

</style>
</head>
<body>

<div id="fixed-header">
  <!-- Hero + Search + Categories injected here by JS -->
</div>

  <!-- Gallery injected here by JS -->
</div>

  </div>

        <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2" fill="#fff" stroke="none"/></svg>
      </button>
    </div>
  </div>
</div>


<script>
// ═══════════════════════════════════════════
const CLOUD_NAME = 'dkwviksvr';
const SHOP_TAG   = 'shop';
const CONFIG_URL = 'config.json';
// ═══════════════════════════════════════════

let PAGE_SIZE = 50;
let CARD_MIN  = 130;
let config    = { categories: [], products: [] };
let filtered  = [];
let currentPage = 0;
let lbIndex   = 0;
let activeCategory = 'all';

// ── 動態計算 fixed header 高度，讓商品區不被蓋住 ──
let _headerObserver = null;

function updateHeaderOffset() {
  const h = document.getElementById('fixed-header');
  const s = document.getElementById('gallery-section');
  if (!h || !s) return;
  const height = h.getBoundingClientRect().height;
  if (height > 0) {
    s.style.paddingTop = (height + 4) + 'px'; // +4px 安全邊距
  }
}

function startHeaderObserver() {
  const h = document.getElementById('fixed-header');
  if (!h) return;

  // 立即計算一次
  updateHeaderOffset();

  // 用 ResizeObserver 監聽 header 高度變化（字體載入/圖片載入都會觸發）
  if (_headerObserver) _headerObserver.disconnect();
  _headerObserver = new ResizeObserver(() => {
    updateHeaderOffset();
  });
  _headerObserver.observe(h);

  // 額外保險：在多個時間點再算一次
  // 字體通常在 100-500ms 後才完全載入
  [50, 150, 300, 600, 1200].forEach(ms => {
    setTimeout(updateHeaderOffset, ms);
  });

  // 圖片載入完成後再算一次
  const logo = h.querySelector('.hero-logo-img');
  if (logo) {
    if (logo.complete) {
      updateHeaderOffset();
    } else {
      logo.addEventListener('load', () => {
        setTimeout(updateHeaderOffset, 50);
      });
      logo.addEventListener('error', () => {
        setTimeout(updateHeaderOffset, 50);
      });
    }
  }
}

// ── 從 Cloudinary Tag 抓圖片清單 ──
async function fetchFromCloudinary() {
  const url = `https://res.cloudinary.com/${CLOUD_NAME}/image/list/${encodeURIComponent(SHOP_TAG)}.json`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`Cloudinary 回應 ${resp.status}，請確認 Tag 名稱和 Resource list 設定`);
  const data = await resp.json();
  return data.resources || [];
}

// ── 從 GitHub 讀分類設定 ──
async function fetchConfig() {
  // ── 從 GitHub config.json 讀取（優先）──
  let cfg = null;
  try {
    const resp = await fetch(CONFIG_URL + '?t=' + Date.now());
    if (resp.ok) cfg = await resp.json();
  } catch(e) {}

  // ── 從 localStorage 讀取（備用或補充）──
  let local = null;
  try {
    const raw = localStorage.getItem('doll_shop_frontend');
    if (raw) local = JSON.parse(raw);
  } catch(e) {}

  // ── 合併：config.json 為主，localStorage 補缺漏欄位 ──
  const merged = {
    // 顯示設定
    displayPageSize:    cfg?.displayPageSize    || local?.displayPageSize    || 50,
    displayCardSize:    cfg?.displayCardSize    || local?.displayCardSize    || 130,
    // 標語
    slogans:            cfg?.slogans?.length    ? cfg.slogans    : (local?.slogans    || []),
    sloganFontSize:     cfg?.sloganFontSize     || local?.sloganFontSize     || 14,
    sloganStyle:        cfg?.sloganStyle        || local?.sloganStyle        || 'C',
    sloganColor:        cfg?.sloganColor        || local?.sloganColor        || '#c0325c',
    // 分類
    categories:         cfg?.categories?.length ? cfg.categories : (local?.categories || []),
    productCategories:  cfg?.productCategories  || local?.productCategories  || [],
    productNames:       cfg?.productNames       || local?.productNames       || {},
    // 聯絡
    contacts:           cfg?.contacts           || local?.contacts           || {},
    aiAssistant:        cfg?.aiAssistant        || local?.aiAssistant        || {},
  };

  return merged;
}

// ── 從 public_id 萃取商品編號 ──
function extractId(publicId) {
  const filename = publicId.includes('/') ? publicId.split('/').pop() : publicId;
  let decoded = filename;
  try { decoded = decodeURIComponent(filename); } catch(e) {}
  const m = decoded.match(/^([A-Za-z]+\d+)/);
  return m ? m[1].toUpperCase() : null;
}

// ── 建立縮圖網址 ──
function buildUrl(product) {
  if (!product.url) return '';
  const sz = CARD_MIN > 150 ? 600 : 400;
  return product.url.replace('/image/upload/', `/image/upload/w_${sz},h_${sz},c_fill,q_auto,f_auto/`);
}
function buildFullUrl(product) {
  if (!product.url) return '';
  return product.url.replace('/image/upload/', '/image/upload/w_1400,h_1400,c_fill,q_auto,f_auto/');
}

// ── Loading 畫面 ──
function showLoading() {
  document.getElementById('fixed-header').innerHTML = '';
  document.getElementById('gallery-section').innerHTML = `
    <div style="text-align:center;padding:80px 20px;">
      <div style="font-size:3.5rem;margin-bottom:16px;animation:spin 1.8s linear infinite;display:inline-block;">🧸</div>
      <div style="font-size:15px;color:var(--text2);margin-top:8px;">商品載入中，請稍候…</div>
    </div>
    <style>@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}</style>`;
}

// ── 錯誤畫面 ──
function showError(msg) {
  document.getElementById('gallery-section').innerHTML = `
    <div style="max-width:480px;margin:60px auto;text-align:center;padding:40px 24px;background:var(--surface);border:1px solid var(--border);border-radius:16px;">
      <div style="font-size:3rem;margin-bottom:12px;">😢</div>
      <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:8px;">圖片載入失敗</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:20px;">${msg}</div>
      <button onclick="init()" style="padding:10px 28px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:var(--sans);">重試</button>
    </div>`;
  setTimeout(updateHeaderOffset, 100);
}

// ── 主初始化 ──
async function init() {
  showLoading();
  try {
    const [resources, cfg] = await Promise.all([fetchFromCloudinary(), fetchConfig()]);

    PAGE_SIZE = cfg.displayPageSize || 50;
    CARD_MIN  = cfg.displayCardSize || 130;
    document.documentElement.style.setProperty('--card-min', CARD_MIN + 'px');

    const catAssign = {};
    (cfg.productCategories || []).forEach(pc => { catAssign[pc.id] = pc.category; });

    const productMap = {};
    resources.forEach(r => {
      const id = extractId(r.public_id);
      if (!id) return;
      if (!productMap[id] || (r.created_at || '') > (productMap[id].created_at || '')) {
        productMap[id] = {
          id,
          name: (cfg.productNames || {})[id] || id,
          url: r.secure_url || `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/v${r.version}/${r.public_id}.${r.format}`,
          format: r.format || 'jpg',
          category: catAssign[id] || '',
          visible: true,
          created_at: r.created_at || ''
        };
      }
    });

    const sortFn = (a, b) => {
      const am = a.id.match(/^([A-Z]+)(\d+)$/), bm = b.id.match(/^([A-Z]+)(\d+)$/);
      if (!am || !bm) return a.id.localeCompare(b.id);
      if (am[1] !== bm[1]) return am[1].localeCompare(bm[1]);
      return parseInt(am[2]) - parseInt(bm[2]);
    };

    config.products   = Object.values(productMap).sort(sortFn);
    config.categories = cfg.categories || [];
    config.slogans        = cfg.slogans || [];
    config.sloganFontSize = cfg.sloganFontSize || 14;
    config.sloganStyle    = cfg.sloganStyle || 'C';
    config.sloganColor    = cfg.sloganColor || '#c0325c';
    config.contacts       = cfg.contacts || {};
    config.aiAssistant    = cfg.aiAssistant || {};

    renderApp();
    // 等 DOM 渲染完再初始化標語
    setTimeout(() => initSlogans(cfg), 100);
    initContactFloat(cfg);
  } catch(err) {
    document.getElementById('fixed-header').innerHTML = '';
    showError(err.message);
  }
}

// ── 渲染整個 App ──
function renderApp() {
  const cats  = config.categories;
  const total = config.products.length;

  // ── Fixed header（Hero + Search + Categories）──
  document.getElementById('fixed-header').innerHTML = `
    <div class="hero">
      <img class="hero-logo-img" src="LOGO.jpg" alt="三麗鷗中毒日記"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div style="display:none;align-items:center;justify-content:center;flex-direction:column;padding:24px;background:#fce8ef;min-height:80px;">
        <div style="font-size:22px;font-weight:700;color:var(--accent);">三麗鷗中毒日記</div>
        <div style="font-size:12px;color:var(--text2);margin-top:4px;">每天都被三麗鷗治癒中♡</div>
      </div>
    </div>

    <div class="sticky-bar">
      <div class="sticky-inner">
        <div class="search-wrap">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="搜尋商品編號或名稱…">
        </div>
        <div class="shop-slogan-wrap"><div id="shopSlogan"></div></div>
        <div class="count-info" id="countInfo">共 ${total} 件商品 · 持續更新中 ♡</div>
      </div>
    </div>

    <div class="cat-scroll">
      <div class="cat-inner" id="catTabs">
        <button class="cat-tab active" data-cat="all">全部商品</button>
        ${cats.map(c => `
          <button class="cat-tab" data-cat="${c.id}">
            <span class="cat-dot" style="background:${c.color}"></span>
            ${c.name}
          </button>`).join('')}
      </div>
    </div>`;

  // ── Gallery section ──
  document.getElementById('gallery-section').innerHTML = `
    <div class="gallery-wrap">
      <div class="gallery" id="gallery"></div>
      <div class="load-more-wrap">
        <button id="loadMoreBtn" style="display:none;">載入更多商品</button>
      </div>
    </div>`;

  // 啟動 header 高度監聽（ResizeObserver + 多時間點）
  startHeaderObserver();
  // 視窗改變時重新計算
  window.addEventListener('resize', updateHeaderOffset);

  // Events
  document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(window._st);
    window._st = setTimeout(applyFilters, 220);
  });
  document.getElementById('catTabs').addEventListener('click', e => {
    const btn = e.target.closest('.cat-tab');
    if (!btn) return;
    document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCategory = btn.dataset.cat;
    applyFilters();
  });
  document.getElementById('loadMoreBtn').addEventListener('click', renderPage);
  applyFilters();
}


// ── 標語系統 ──
let sloganTimer = null;
let sloganList  = [];
let sloganIdx   = 0;
let sloganStyle = 'C';
let sloganColor = '#c0325c';
let sloganSize  = 14;
const CHAR_COLORS = ['#ff6b9d','#ff9a3c','#ffd93d','#6bcb77','#4d96ff','#c77dff'];

function initSlogans(cfg) {
  sloganList  = (cfg.slogans && cfg.slogans.length > 0) ? cfg.slogans : ['錢錢沒有不見，只是變成妳愛的樣子 ♡'];
  sloganStyle = cfg.sloganStyle  || 'C';
  sloganColor = cfg.sloganColor  || '#c0325c';
  sloganSize  = cfg.sloganFontSize || 14;
  sloganIdx   = Math.floor(Math.random() * sloganList.length);
  rotateSlogans();
}

function buildSloganEl(text) {
  const el = document.getElementById('shopSlogan');
  if (!el) return;
  el.innerHTML = '';
  el.style.fontSize = '';
  el.className = '';

  if (sloganStyle === 'A') {
    const span = document.createElement('span');
    span.className = 'slogan-style-a';
    span.style.fontSize = sloganSize + 'px';
    span.textContent = text;
    el.appendChild(span);

  } else if (sloganStyle === 'B') {
    const wrap = document.createElement('div');
    wrap.className = 'slogan-style-b-wrap';
    wrap.style.width = '100%';
    const track = document.createElement('div');
    track.className = 'slogan-style-b-track';
    // 重複兩次讓跑馬燈無縫循環
    for (let i = 0; i < 2; i++) {
      const span = document.createElement('span');
      span.className = 'slogan-style-b-text';
      span.style.color = sloganColor;
      span.style.textShadow = `0 0 6px ${sloganColor}, 0 0 14px ${sloganColor}`;
      span.style.fontSize = sloganSize + 'px';
      span.textContent = '🧸 ' + text + '   ';
      track.appendChild(span);
    }
    wrap.appendChild(track);
    el.appendChild(wrap);

  } else if (sloganStyle === 'C') {
    // 打字機：外層 wrap 控制寬度展開，內層 span 控制游標閃爍
    const wrap = document.createElement('span');
    wrap.className = 'slogan-style-c-wrap';
    const span = document.createElement('span');
    span.className = 'slogan-style-c';
    span.style.color = sloganColor;
    span.style.fontSize = sloganSize + 'px';
    span.textContent = text;
    wrap.appendChild(span);
    el.appendChild(wrap);

  } else if (sloganStyle === 'D') {
    const wrap = document.createElement('div');
    wrap.className = 'slogan-style-d';
    ;[...text].forEach((ch, i) => {
      const span = document.createElement('span');
      span.textContent = ch === ' ' ? ' ' : ch;
      span.style.color = CHAR_COLORS[i % CHAR_COLORS.length];
      span.style.animationDelay = (i * 0.07) + 's';
      span.style.fontSize = sloganSize + 'px';
      wrap.appendChild(span);
    });
    el.appendChild(wrap);

  } else if (sloganStyle === 'E') {
    const span = document.createElement('span');
    span.className = 'slogan-style-e';
    span.style.color = sloganColor;
    span.style.textShadow = `0 0 10px ${sloganColor}88`;
    span.style.fontSize = sloganSize + 'px';
    span.innerHTML = '<span class="spin-icon">🌸</span> ' + text + ' <span class="spin-icon">🌸</span>';
    el.appendChild(span);

  } else if (sloganStyle === 'F') {
    const wrap = document.createElement('div');
    wrap.className = 'slogan-style-f';
    ;[...text].forEach((ch, i) => {
      const span = document.createElement('span');
      span.textContent = ch === ' ' ? ' ' : ch;
      span.style.color = CHAR_COLORS[i % CHAR_COLORS.length];
      span.style.animationDelay = (i * 0.1) + 's';
      span.style.fontSize = sloganSize + 'px';
      wrap.appendChild(span);
    });
    el.appendChild(wrap);
  }
}

function rotateSlogans() {
  clearInterval(sloganTimer);
  if (sloganList.length === 0) return;

  const show = () => {
    const el = document.getElementById('shopSlogan');
    if (!el) return;
    // 樣式 B 不需要淡入淡出（跑馬燈本身就是連續的）
    if (sloganStyle === 'B') {
      buildSloganEl(sloganList[sloganIdx % sloganList.length]);
      sloganIdx = (sloganIdx + 1) % sloganList.length;
      return;
    }
    el.style.opacity = '0';
    el.style.transition = 'opacity 0.5s';
    setTimeout(() => {
      buildSloganEl(sloganList[sloganIdx % sloganList.length]);
      el.style.opacity = '1';
      sloganIdx = (sloganIdx + 1) % sloganList.length;
    }, 500);
  };

  show();
  if (sloganList.length > 1) sloganTimer = setInterval(show, 4500);
}

function applyFilters() {
  const q = (document.getElementById('searchInput')?.value || '').trim().toLowerCase();
  filtered = config.products.filter(p => {
    const matchCat = activeCategory === 'all' || p.category === activeCategory;
    // 搜尋：同時比對 id 和 name，大小寫不分
    const pid = (p.id || '').toLowerCase();
    const pname = (p.name || '').toLowerCase();
    const matchQ = !q || pid.includes(q) || pname.includes(q);
    return matchCat && matchQ && p.visible !== false;
  });
  currentPage = 0;
  const g = document.getElementById('gallery');
  if (g) g.innerHTML = '';
  // 強制立即渲染（不管 filtered 是否為空都執行）
  renderPage();
  // 更新計數
  const ci = document.getElementById('countInfo');
  if (ci) {
    if (!q && activeCategory === 'all') {
      ci.textContent = `共 ${filtered.length} 件商品 · 持續更新中 ♡`;
    } else {
      ci.textContent = `搜尋結果 ${filtered.length} 件`;
    }
  }
}

function renderPage() {
  const gallery = document.getElementById('gallery');
  if (!gallery) return;
  const start = currentPage * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);
  const cats  = config.categories;

  if (filtered.length === 0) {
    gallery.innerHTML = `<div class="state-empty"><div class="icon">🔍</div><p>找不到符合條件的商品</p><small>試試其他關鍵字或分類</small></div>`;
    document.getElementById('loadMoreBtn').style.display = 'none';
    return;
  }

  slice.forEach((p, i) => {
    const cat    = cats.find(c => c.id === p.category);
    const imgUrl = buildUrl(p);
    const card   = document.createElement('div');
    card.className = 'card';
    card.dataset.idx = start + i;
    card.innerHTML = `
      <div class="img-wrap">
        <div class="skeleton"></div>
        <img src="${imgUrl}" alt="${p.name || p.id}">
        <div class="overlay"><span class="overlay-hint">點擊放大 🔍</span></div>
      </div>
      <div class="card-info">
        <div class="card-id">No. ${p.id}</div>
        <div class="card-name">${p.name || p.id}</div>
        ${cat
          ? `<span class="card-cat-badge" style="background:${cat.color}18;color:${cat.color};border:1px solid ${cat.color}33;"><span style="width:6px;height:6px;border-radius:50%;background:${cat.color};display:inline-block;margin-right:2px;"></span>${cat.name}</span>`
          : '<span class="card-cat-badge" style="background:var(--surface2);color:var(--text3);">未分類</span>'}
      </div>`;

    const img  = card.querySelector('img');
    const wrap = card.querySelector('.img-wrap');
    const markLoaded = () => wrap.classList.add('img-loaded');
    if (img.complete && img.naturalWidth > 0) markLoaded();
    else img.addEventListener('load', markLoaded);
    img.addEventListener('error', () => {
      wrap.classList.add('img-loaded');
      img.style.display = 'none';
      const ph = document.createElement('div');
      ph.style.cssText = 'width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;color:var(--text3);font-size:12px;';
      ph.innerHTML = '<span style="font-size:2rem">🧸</span>' + p.id;
      wrap.appendChild(ph);
    });
    card.addEventListener('click', () => openLightbox(start + i));
    gallery.appendChild(card);
  });

  currentPage++;
  const remaining = filtered.length - currentPage * PAGE_SIZE;
  const btn = document.getElementById('loadMoreBtn');
  if (remaining > 0) {
    btn.style.display = 'inline-flex';
    btn.textContent = `載入更多（還有 ${remaining} 件）`;
  } else {
    btn.style.display = 'none';
  }
  // countInfo 由 applyFilters 統一管理
}

// ── Lightbox ──
function openLightbox(index) {
  lbIndex = index; updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
function updateLightbox() {
  const p = filtered[lbIndex]; if (!p) return;
  const cat = config.categories.find(c => c.id === p.category);
  document.getElementById('lbImg').src           = buildFullUrl(p);
  document.getElementById('lbImg').alt           = p.name || p.id;
  document.getElementById('lbId').textContent    = `No. ${p.id}`;
  document.getElementById('lbName').textContent  = p.name || p.id;
  document.getElementById('lbCat').textContent   = cat ? `✦ ${cat.name}` : '';
  document.getElementById('lbCounter').textContent = `${lbIndex + 1} / ${filtered.length}`;
}
document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lbPrev').addEventListener('click',  () => { lbIndex = (lbIndex - 1 + filtered.length) % filtered.length; updateLightbox(); });
document.getElementById('lbNext').addEventListener('click',  () => { lbIndex = (lbIndex + 1) % filtered.length; updateLightbox(); });
document.getElementById('lightbox').addEventListener('click', e => { if (e.target === document.getElementById('lightbox')) closeLightbox(); });
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft')  { lbIndex = (lbIndex - 1 + filtered.length) % filtered.length; updateLightbox(); }
  if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % filtered.length; updateLightbox(); }
});

// ── Scroll to top ──
window.addEventListener('scroll', () => {
  document.getElementById('toTop').classList.toggle('show', window.scrollY > 300);
});
document.getElementById('toTop').addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

// ── 初始化聯絡浮動按鈕 ──
function initContactFloat(cfg) {
  const wrap = document.getElementById('contact-float');
  if (!wrap) return;
  wrap.innerHTML = '';

  const contacts = cfg.contacts || {};
  const aiCfg    = cfg.aiAssistant || {};

  const platforms = [
    { key:'line',  cls:'cf-line',  label:'加入 LINE',  action: () => openContactModal('line',  cfg) },
    { key:'fb',    cls:'cf-fb',    label:'FB 私訊',    action: () => openContactModal('fb',    cfg) },
    { key:'ig',    cls:'cf-ig',    label:'IG 私訊',    action: () => openContactModal('ig',    cfg) },
    { key:'wa',    cls:'cf-wa',    label:'WhatsApp',   action: () => openContactModal('wa',    cfg) },
    { key:'email', cls:'cf-email', label:'Email',      action: () => openContactModal('email', cfg) },
  ];

  // 加入啟用的平台按鈕
  platforms.forEach(p => {
    const c = contacts[p.key];
    if (!c || !c.enabled) return;
    const btn = document.createElement('button');
    btn.className = 'cf-btn ' + p.cls;
    btn.setAttribute('aria-label', p.label);
    btn.innerHTML = ICONS[p.key] + `<span class="cf-tooltip">${p.label}</span>`;
    btn.onclick = p.action;
    wrap.appendChild(btn);
  });

  // AI 小幫手按鈕
  if (aiCfg.enabled) {
    const btn = document.createElement('button');
    btn.className = 'cf-btn cf-ai';
    btn.setAttribute('aria-label', aiCfg.name || 'AI 小幫手');
    btn.innerHTML = ICONS.ai + `<span class="cf-tooltip">${aiCfg.name || 'AI 小幫手'}</span>`;
    btn.onclick = () => openAiModal(aiCfg);
    wrap.appendChild(btn);
  }
}

// ── 聯絡 Modal（QR / 連結）──
function openContactModal(platform, cfg) {
  const c    = (cfg.contacts || {})[platform];
  if (!c) return;
  const box  = document.getElementById('contactModalBody');
  const wrap = document.getElementById('contactModal');

  const meta = {
    line:  { color:'#06C755', label:'加入 LINE',   hint:'手機點按鈕直接開啟 LINE', icon:'💚' },
    fb:    { color:'#1877F2', label:'FB 私訊',     hint:'點擊前往 Facebook 粉專',  icon:'💙' },
    ig:    { color:'#E1306C', label:'IG 私訊',     hint:'點擊前往 Instagram',      icon:'🩷' },
    wa:    { color:'#25D366', label:'WhatsApp',    hint:'點擊開啟 WhatsApp',       icon:'💬' },
    email: { color:'#ea4335', label:'寄送 Email',  hint:'點擊開啟郵件程式',        icon:'📧' },
  }[platform];

  let qrHTML = '';
  if (platform === 'line' && c.qrImage) {
    qrHTML = `<img class="modal-qr-img" src="${c.qrImage}" alt="QR Code" style="color:${meta.color};border-color:${meta.color};">`;
  }

  box.innerHTML = `
    <div class="modal-qr-icon">${meta.icon}</div>
    <div class="modal-qr-title" style="color:${meta.color};">${c.title || meta.label}</div>
    <div class="modal-qr-sub">${c.desc || ''}</div>
    ${qrHTML}
    <button class="modal-cta-btn" style="background:${meta.color};" id="contactCtaBtn">
      ${ICONS[platform]} ${meta.label}
    </button>
    ${c.hint ? `<div class="modal-hint">${c.hint}</div>` : `<div class="modal-hint">${meta.hint}</div>`}`;

  // 設定連結（不明文顯示在 HTML）
  document.getElementById('contactCtaBtn').onclick = () => {
    let url = '';
    if (platform === 'line')  url = c.url || '';
    if (platform === 'fb')    url = c.url || '';
    if (platform === 'ig')    url = `https://ig.me/m/${c.username || ''}`;
    if (platform === 'wa')    url = `https://wa.me/${(c.phone||'').replace(/\D/g,'')}`;
    if (platform === 'email') url = `mailto:${c.email || ''}`;
    if (url) window.open(url, '_blank', 'noopener');
  };

  wrap.classList.add('open');
}
function closeContactModal(e) {
  if (e.target === document.getElementById('contactModal'))
    document.getElementById('contactModal').classList.remove('open');
}
function closeContactModalDirect() {
  document.getElementById('contactModal').classList.remove('open');
}

// ── AI 小幫手 ──
let aiQA = [];
function openAiModal(aiCfg) {
  aiQA = aiCfg.qa || [];
  const nameEl   = document.getElementById('aiName');
  const avatarEl = document.getElementById('aiAvatar');
  if (nameEl)   nameEl.textContent   = aiCfg.name   || 'AI 小幫手';
  if (avatarEl) avatarEl.textContent = aiCfg.avatar || '🤖';

  // 清空重建
  const msgs = document.getElementById('aiMsgs');
  msgs.innerHTML = '';
  addAiBubble('bot', `嗨！我是 ${aiCfg.name || '小幫手'} ${aiCfg.avatar || '🤖'}<br>有任何問題都可以問我喔！`);

  // 快速問題按鈕
  const qbtns = document.getElementById('aiQuickBtns');
  qbtns.innerHTML = aiQA.slice(0,5).map(q =>
    `<button class="ai-quick-btn" onclick="handleAiQuick(${JSON.stringify(q.q)})">${q.q}</button>`
  ).join('');

  document.getElementById('aiInput').value = '';
  document.getElementById('aiModal').classList.add('open');
}
function closeAiModal(e) {
  if (e.target === document.getElementById('aiModal'))
    document.getElementById('aiModal').classList.remove('open');
}
function closeAiModalDirect() {
  document.getElementById('aiModal').classList.remove('open');
}

function addAiBubble(type, html) {
  const msgs = document.getElementById('aiMsgs');
  const div  = document.createElement('div');
  div.className = 'ai-bubble ' + type;
  div.innerHTML  = html;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return div;
}

function handleAiQuick(q) {
  document.getElementById('aiInput').value = q;
  sendAiMsg();
}

function sendAiMsg() {
  const input = document.getElementById('aiInput');
  const q = input.value.trim();
  if (!q) return;
  input.value = '';

  addAiBubble('user', q);

  // 比對 QA（關鍵字模糊比對）
  const lower = q.toLowerCase();
  const match = aiQA.find(item =>
    lower.includes(item.q.toLowerCase()) ||
    item.q.toLowerCase().split('').some(ch => lower.includes(ch)) ||
    (item.keywords || []).some(kw => lower.includes(kw.toLowerCase()))
  );

  // 打字動畫
  const typingDiv = addAiBubble('bot typing', '···');
  setTimeout(() => {
    typingDiv.classList.remove('typing');
    if (match) {
      typingDiv.innerHTML = match.a;
    } else {
      typingDiv.innerHTML = '這個問題我還不確定，建議直接聯絡我們哦！<br><small style="color:#aaa">（你可以點右下角其他聯絡按鈕）</small>';
    }
    document.getElementById('aiMsgs').scrollTop = 9999;
  }, 800);
}

// ESC 關閉所有 modal
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('contactModal')?.classList.remove('open');
    document.getElementById('aiModal')?.classList.remove('open');
  }
});



// ══════════════════════════════════════════════════════
// 🔒 防護系統
// ══════════════════════════════════════════════════════
(function() {

  // ── 1. 停用右鍵選單 ──
  document.addEventListener('contextmenu', function(e) {
    // 允許輸入框和 AI 聊天框右鍵（方便打字）
    const tag = e.target.tagName.toLowerCase();
    if (tag === 'input' || tag === 'textarea') return;
    e.preventDefault();
    return false;
  });

  // ── 2. 停用圖片拖曳 ──
  document.addEventListener('dragstart', function(e) {
    if (e.target.tagName === 'IMG') {
      e.preventDefault();
      return false;
    }
  });

  // ── 3. 停用長按選取（手機）──
  document.addEventListener('touchstart', function(e) {
    if (e.target.tagName === 'IMG') {
      e.preventDefault();
    }
  }, { passive: false });

  // ── 4. 停用鍵盤快捷鍵：F12、Ctrl+U、Ctrl+Shift+I/J/C ──
  document.addEventListener('keydown', function(e) {
    // F12
    if (e.key === 'F12') {
      e.preventDefault(); return false;
    }
    // Ctrl+U（檢視原始碼）
    if (e.ctrlKey && e.key === 'u') {
      e.preventDefault(); return false;
    }
    // Ctrl+Shift+I / J / C（開發者工具）
    if (e.ctrlKey && e.shiftKey && ['i','I','j','J','c','C'].includes(e.key)) {
      e.preventDefault(); return false;
    }
    // Ctrl+S（另存網頁）
    if (e.ctrlKey && e.key === 's') {
      e.preventDefault(); return false;
    }
    // Ctrl+A（全選）在圖片區
    if (e.ctrlKey && e.key === 'a') {
      const active = document.activeElement?.tagName?.toLowerCase();
      if (active !== 'input' && active !== 'textarea') {
        e.preventDefault(); return false;
      }
    }
  });

  // ── 5. 偵測開發者工具是否開啟（尺寸差異法）──
  let devToolsOpen = false;
  const threshold = 160;
  const checkDevTools = () => {
    const widthDiff  = window.outerWidth  - window.innerWidth;
    const heightDiff = window.outerHeight - window.innerHeight;
    if (widthDiff > threshold || heightDiff > threshold) {
      if (!devToolsOpen) {
        devToolsOpen = true;
        // 不做強烈阻擋，只做提示（避免影響正常使用者）
        console.clear();
        console.log('%c⚠️ 本網站圖片受版權保護，請勿複製或轉載。',
          'color:#e8608a;font-size:16px;font-weight:bold;');
      }
    } else {
      devToolsOpen = false;
    }
  };
  setInterval(checkDevTools, 1000);

  // ── 6. 清除 console（讓程式碼不易被分析）──
  setInterval(() => { console.clear(); }, 3000);

})();

init();
