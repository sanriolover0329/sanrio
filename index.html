<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三麗鷗中毒日記</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono&display=swap');

:root {
  --bg: #fff5f7;
  --surface: #ffffff;
  --surface2: #fff0f3;
  --border: #f0d0da;
  --accent: #e8608a;
  --accent2: #f9b8cb;
  --accent-dark: #c0325c;
  --text: #3a2030;
  --text2: #8a607a;
  --text3: #c0a0b0;
  --radius: 12px;
  --sans: 'Noto Sans TC', sans-serif;
  --serif: 'Playfair Display', serif;
  --mono: 'DM Mono', monospace;
  --header-h: 0px; /* JS will set this */
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); overflow-y: scroll; }

/* ════════════════════════════════════════
   FIXED HEADER WRAPPER
   包含 Hero + 搜尋列 + 分類列，全部固定在頂部
   ════════════════════════════════════════ */
#fixed-header {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: var(--bg);
  box-shadow: 0 2px 12px rgba(232,96,138,0.08);
}

/* ── Hero / Logo ── */
.hero {
  background: #fce8ef;
  border-bottom: 2px solid #f9b8cb;
  width: 100%;
  overflow: hidden;
}
.hero-logo-img {
  display: block;
  width: 100%;
  /* 關鍵：用 aspect-ratio 讓圖片等比例縮放，不裁切 */
  height: auto;
  max-height: 260px;
  object-fit: contain;
  object-position: center center;
  background: #fce8ef;
}
@media (max-width: 900px)  { .hero-logo-img { max-height: 180px; } }
@media (max-width: 600px)  { .hero-logo-img { max-height: 120px; } }
@media (max-width: 400px)  { .hero-logo-img { max-height: 90px;  } }

/* ── Search Bar ── */
.sticky-bar {
  background: rgba(255,245,247,0.97);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.sticky-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 8px 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: nowrap;
}
.search-wrap { position: relative; flex: 1; max-width: 320px; min-width: 120px; }
.search-wrap svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
#searchInput {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px 8px 32px;
  font-family: var(--sans);
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
#searchInput:focus { border-color: var(--accent); background: #fff; }
#searchInput::placeholder { color: var(--text3); }

.shop-slogan {
  font-size: 12px;
  color: var(--accent);
  font-style: italic;
  white-space: nowrap;
  flex-shrink: 1;
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  letter-spacing: 0.02em;
}
@media (max-width: 600px) { .shop-slogan { display: none; } }

.count-info {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text2);
  white-space: nowrap;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 8px;
  flex-shrink: 0;
}
@media (max-width: 480px) { .count-info { display: none; } }

/* ── Category Tabs ── */
.cat-scroll {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.cat-inner {
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 16px;
  display: flex;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.cat-inner::-webkit-scrollbar { display: none; }
.cat-tab {
  flex-shrink: 0;
  padding: 11px 16px;
  font-family: var(--sans);
  font-size: 13px;
  color: var(--text2);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 5px;
}
.cat-tab:hover { color: var(--accent); }
.cat-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
.cat-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

/* ════════════════════════════════════════
   商品區：用 padding-top 讓出固定 header 的空間
   JS 會動態計算 header 實際高度並設定 padding-top
   ════════════════════════════════════════ */
#gallery-section {
  padding-top: var(--header-h, 320px); /* fallback */
}
.gallery-wrap {
  max-width: 1400px;
  margin: 0 auto;
  padding: 16px 16px 120px;
}

/* ── Gallery Grid ── */
.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(var(--card-min,130px), 1fr));
  gap: 10px;
}

/* ── Product Card ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: visible;
  cursor: pointer;
  position: relative;
  transition: z-index 0s;
}
.card:hover { z-index: 10; }

.img-wrap {
  position: relative;
  overflow: hidden;
  aspect-ratio: 1;
  background: var(--surface2);
  border-radius: 9px 9px 0 0;
}
.img-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.4s cubic-bezier(0.34,1.2,0.64,1);
}
.card:hover .img-wrap img { transform: scale(1.15); }
.card:hover {
  box-shadow: 0 12px 36px rgba(232,96,138,0.22), 0 0 0 2px var(--accent);
  border-color: var(--accent);
  transform: translateY(-4px) scale(1.06);
  transition: transform 0.3s cubic-bezier(0.34,1.4,0.64,1), box-shadow 0.3s, border-color 0.2s;
}

.skeleton {
  position: absolute; inset: 0;
  background: linear-gradient(90deg, var(--surface2) 25%, #ffe0ea 50%, var(--surface2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 9px 9px 0 0;
}
.img-loaded .skeleton { display: none; }
@keyframes shimmer { 0%{background-position:200%} 100%{background-position:-200%} }

.overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(200,50,100,0.55) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.2s;
  display: flex; align-items: flex-end; justify-content: center;
  padding-bottom: 8px;
  border-radius: 9px 9px 0 0;
}
.card:hover .overlay { opacity: 1; }
.overlay-hint {
  background: rgba(255,255,255,0.9);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 11px;
  color: var(--accent-dark);
  font-weight: 500;
  pointer-events: none;
}

.card-info { padding: 6px 8px 8px; }
.card-id { font-family: var(--mono); font-size: 9px; color: var(--text3); }
.card-name { font-size: 11px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 1px 0 4px; color: var(--text); }
.card-cat-badge { display: inline-flex; align-items: center; gap: 3px; font-size: 9px; padding: 1px 6px; border-radius: 4px; font-weight: 500; }

/* ── Empty State ── */
.state-empty { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--text3); }
.state-empty .icon { font-size: 3rem; margin-bottom: 12px; }
.state-empty p { font-size: 14px; margin-bottom: 6px; }
.state-empty small { font-size: 12px; }

/* ── Load More ── */
.load-more-wrap { text-align: center; margin-top: 32px; }
#loadMoreBtn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 36px;
  background: transparent;
  border: 1.5px solid var(--accent);
  border-radius: 8px;
  color: var(--accent);
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
#loadMoreBtn:hover { background: var(--accent); color: #fff; }

/* ── Lightbox ── */
#lightbox {
  display: none;
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(20,16,14,0.96);
  backdrop-filter: blur(10px);
  align-items: center; justify-content: center;
}
#lightbox.open { display: flex; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }
.lb-counter { position: fixed; top: 18px; left: 50%; transform: translateX(-50%); font-family: var(--mono); font-size: 12px; color: rgba(255,255,255,.35); background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); border-radius: 20px; padding: 4px 14px; }
.lb-wrap { position: relative; max-width: min(88vw,860px); display: flex; flex-direction: column; align-items: center; gap: 14px; }
#lbImg { max-width: 100%; max-height: 72vh; object-fit: contain; border-radius: 12px; border: 1px solid rgba(255,255,255,.08); animation: zoomIn .28s cubic-bezier(.34,1.56,.64,1); }
@keyframes zoomIn { from{transform:scale(.88);opacity:0} to{transform:scale(1);opacity:1} }
.lb-info { text-align: center; }
.lb-id { font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,.3); margin-bottom: 4px; }
.lb-name { font-family: var(--serif); font-size: 1.3rem; color: #f5f0ea; margin-bottom: 4px; }
.lb-cat { font-size: 12px; color: var(--accent2); letter-spacing: .06em; }
.lb-nav { position: fixed; top: 50%; transform: translateY(-50%); width: 46px; height: 46px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-size: 20px; transition: all .18s; backdrop-filter: blur(4px); }
.lb-nav:hover { background: var(--accent); border-color: var(--accent); }
#lbPrev { left: 20px; }
#lbNext { right: 20px; }
.lb-close { position: fixed; top: 18px; right: 20px; width: 38px; height: 38px; background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.12); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; font-size: 20px; transition: background .15s; }
.lb-close:hover { background: #c04040; border-color: #c04040; }

/* ── No Config ── */
.no-config { max-width: 500px; margin: 80px auto; text-align: center; padding: 48px 32px; background: var(--surface); border: 1px solid var(--border); border-radius: 16px; }
.no-config .icon { font-size: 3rem; margin-bottom: 16px; }
.no-config h2 { font-family: var(--serif); font-size: 1.5rem; margin-bottom: 8px; }
.no-config p { font-size: 13px; color: var(--text2); margin-bottom: 20px; line-height: 1.7; }
.no-config a { display: inline-flex; align-items: center; gap: 6px; padding: 11px 24px; background: var(--accent); color: #fff; border-radius: 8px; font-size: 13px; font-weight: 500; text-decoration: none; transition: background .15s; }
.no-config a:hover { background: var(--accent-dark); }

/* ── Scroll to top ── */
#toTop {
  position: fixed; bottom: 90px; right: 20px;
  width: 40px; height: 40px;
  background: var(--accent); border: none; border-radius: 50%;
  color: #fff; font-size: 18px; cursor: pointer;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
  display: flex; align-items: center; justify-content: center;
  z-index: 99;
  box-shadow: 0 4px 14px rgba(232,96,138,0.4);
}
#toTop.show { opacity: 1; pointer-events: all; }

/* ── LINE 浮動聯絡鈕（右側） ── */
.line-float {
  position: fixed;
  bottom: 24px;
  right: 20px;        /* ← 改右側 */
  z-index: 200;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}
.line-float-btn {
  width: 52px; height: 52px;
  background: #06C755;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 16px rgba(6,199,85,0.45);
  transition: transform 0.2s, box-shadow 0.2s;
  border: none; cursor: pointer;
}
.line-float-btn:hover { transform: scale(1.1); box-shadow: 0 6px 24px rgba(6,199,85,0.55); }
.line-float-btn svg { width: 28px; height: 28px; fill: #fff; }
.line-float-label { font-size: 10px; color: #06C755; font-weight: 700; background: #fff; border-radius: 8px; padding: 2px 7px; box-shadow: 0 2px 8px rgba(0,0,0,.1); white-space: nowrap; }

/* LINE QR Modal */
.line-modal-bg { display: none; position: fixed; inset: 0; z-index: 500; background: rgba(0,0,0,.5); backdrop-filter: blur(6px); align-items: center; justify-content: center; }
.line-modal-bg.open { display: flex; animation: fadeIn 0.2s ease; }
.line-modal { background: #fff; border-radius: 20px; padding: 28px 24px; text-align: center; width: 300px; max-width: 90vw; box-shadow: 0 24px 60px rgba(0,0,0,.25); position: relative; }
.line-modal-icon { font-size: 2rem; margin-bottom: 4px; }
.line-modal-title { font-size: 16px; font-weight: 700; color: #06C755; margin-bottom: 2px; }
.line-modal-sub { font-size: 12px; color: #888; margin-bottom: 16px; }
.line-modal-qr { width: 180px; height: 180px; object-fit: contain; border-radius: 12px; border: 3px solid #06C755; margin-bottom: 14px; display: block; margin-left: auto; margin-right: auto; }
.line-modal-cta { display: inline-flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 12px; background: #06C755; color: #fff; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; border: none; font-family: var(--sans); transition: background .15s; }
.line-modal-cta:hover { background: #05a648; }
.line-modal-close { position: absolute; top: 12px; right: 14px; background: none; border: none; font-size: 22px; color: #aaa; cursor: pointer; line-height: 1; }
.line-modal-hint { font-size: 11px; color: #aaa; margin-top: 10px; }

@media (max-width: 480px) {
  .gallery { grid-template-columns: repeat(2, 1fr); gap: 8px; }
  #lbPrev { left: 6px; } #lbNext { right: 6px; }
  .lb-nav { width: 36px; height: 36px; font-size: 16px; }
}
</style>
</head>
<body>

<div id="fixed-header">
  <!-- Hero + Search + Categories injected here by JS -->
</div>
<div id="gallery-section">
  <!-- Gallery injected here by JS -->
</div>

<!-- Lightbox -->
<div id="lightbox" role="dialog" aria-modal="true">
  <div class="lb-counter" id="lbCounter"></div>
  <div class="lb-wrap">
    <img id="lbImg" src="" alt="">
    <div class="lb-info">
      <div class="lb-id" id="lbId"></div>
      <div class="lb-name" id="lbName"></div>
      <div class="lb-cat" id="lbCat"></div>
    </div>
  </div>
  <button class="lb-nav" id="lbPrev">&#8592;</button>
  <button class="lb-nav" id="lbNext">&#8594;</button>
  <button class="lb-close" id="lbClose">&#215;</button>
</div>

<button id="toTop" aria-label="回頂部">↑</button>

<!-- LINE 浮動按鈕 -->
<div class="line-float" onclick="openLineModal()">
  <button class="line-float-btn" aria-label="加入LINE群組">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.070 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/>
    </svg>
  </button>
  <div class="line-float-label">加入群組</div>
</div>

<!-- LINE QR Modal -->
<div class="line-modal-bg" id="lineModal" onclick="closeLineModal(event)">
  <div class="line-modal">
    <button class="line-modal-close" onclick="closeLineModalDirect()">×</button>
    <div class="line-modal-icon">💚</div>
    <div class="line-modal-title">加入 LINE 群組</div>
    <div class="line-modal-sub">掃描 QR Code 或點擊按鈕即可加入</div>
    <img class="line-modal-qr" src="line-qr.jpg" alt="LINE QR Code">
    <button class="line-modal-cta" id="lineJoinBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#fff"><path d="M19.365 9.863c.349 0 .63.285.63.631 0 .345-.281.63-.63.63H17.61v1.125h1.755c.349 0 .63.283.63.63 0 .344-.281.629-.63.629h-2.386c-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63h2.386c.349 0 .63.285.63.63 0 .349-.281.63-.63.63H17.61v1.125h1.755zm-3.855 3.016c0 .27-.174.51-.432.596-.064.021-.133.031-.199.031-.211 0-.391-.09-.51-.25l-2.443-3.317v2.94c0 .344-.279.629-.631.629-.346 0-.626-.285-.626-.629V8.108c0-.27.173-.51.43-.595.06-.023.136-.033.194-.033.195 0 .375.104.495.254l2.462 3.33V8.108c0-.345.282-.63.63-.63.345 0 .63.285.63.63v4.771zm-5.741 0c0 .344-.282.629-.631.629-.345 0-.627-.285-.627-.629V8.108c0-.345.282-.63.627-.63.349 0 .631.285.631.63v4.771zm-2.466.629H4.917c-.345 0-.63-.285-.63-.629V8.108c0-.345.285-.63.63-.63.348 0 .63.285.63.63v4.141h1.756c.348 0 .629.283.629.63 0 .344-.281.629-.629.629M24 10.314C24 4.943 18.615.572 12 .572S0 4.943 0 10.314c0 4.811 4.27 8.842 10.035 9.608.391.082.923.258 1.058.59.12.301.079.766.038 1.08l-.164 1.02c-.045.301-.24 1.186 1.049.645 1.291-.539 6.916-4.070 9.436-6.975C23.176 14.393 24 12.458 24 10.314"/></svg>
      立即加入群組
    </button>
    <div class="line-modal-hint">手機用戶點擊按鈕可直接開啟 LINE</div>
  </div>
</div>


<script>
// ═══════════════════════════════════════════
const CLOUD_NAME = 'dkwviksvr';
const SHOP_TAG   = 'shop';
const CONFIG_URL = 'config.json';
// ═══════════════════════════════════════════

let PAGE_SIZE = 50;
let CARD_MIN  = 130;
let config    = { categories: [], products: [] };
let filtered  = [];
let currentPage = 0;
let lbIndex   = 0;
let activeCategory = 'all';

// ── 動態計算 fixed header 高度，讓商品區不被蓋住 ──
function updateHeaderOffset() {
  const h = document.getElementById('fixed-header');
  const s = document.getElementById('gallery-section');
  if (h && s) {
    const height = h.getBoundingClientRect().height;
    s.style.paddingTop = height + 'px';
  }
}

// ── 從 Cloudinary Tag 抓圖片清單 ──
async function fetchFromCloudinary() {
  const url = `https://res.cloudinary.com/${CLOUD_NAME}/image/list/${encodeURIComponent(SHOP_TAG)}.json`;
  const resp = await fetch(url);
  if (!resp.ok) throw new Error(`Cloudinary 回應 ${resp.status}，請確認 Tag 名稱和 Resource list 設定`);
  const data = await resp.json();
  return data.resources || [];
}

// ── 從 GitHub 讀分類設定 ──
async function fetchConfig() {
  try {
    const resp = await fetch(CONFIG_URL + '?t=' + Date.now());
    if (resp.ok) {
      const cfg = await resp.json();
      if (!cfg.categories || cfg.categories.length === 0) {
        const local = localStorage.getItem('doll_shop_frontend');
        if (local) {
          const lc = JSON.parse(local);
          if (lc.categories && lc.categories.length > 0) {
            cfg.categories = lc.categories;
            cfg.productCategories = (lc.products || []).filter(p => p.category).map(p => ({ id: p.id, category: p.category }));
          }
        }
      }
      return cfg;
    }
  } catch(e) {}
  try {
    const local = localStorage.getItem('doll_shop_frontend');
    if (local) {
      const lc = JSON.parse(local);
      return {
        categories: lc.categories || [],
        displayPageSize: lc.displayPageSize || 50,
        displayCardSize: lc.displayCardSize || 130,
        productCategories: (lc.products || []).filter(p => p.category).map(p => ({ id: p.id, category: p.category })),
        productNames: {}
      };
    }
  } catch(e) {}
  return { categories: [], displayPageSize: 50, displayCardSize: 130 };
}

// ── 從 public_id 萃取商品編號 ──
function extractId(publicId) {
  const filename = publicId.includes('/') ? publicId.split('/').pop() : publicId;
  let decoded = filename;
  try { decoded = decodeURIComponent(filename); } catch(e) {}
  const m = decoded.match(/^([A-Za-z]+\d+)/);
  return m ? m[1].toUpperCase() : null;
}

// ── 建立縮圖網址 ──
function buildUrl(product) {
  if (!product.url) return '';
  const sz = CARD_MIN > 150 ? 600 : 400;
  return product.url.replace('/image/upload/', `/image/upload/w_${sz},h_${sz},c_fill,q_auto,f_auto/`);
}
function buildFullUrl(product) {
  if (!product.url) return '';
  return product.url.replace('/image/upload/', '/image/upload/w_1400,h_1400,c_fill,q_auto,f_auto/');
}

// ── Loading 畫面 ──
function showLoading() {
  document.getElementById('fixed-header').innerHTML = '';
  document.getElementById('gallery-section').innerHTML = `
    <div style="text-align:center;padding:80px 20px;">
      <div style="font-size:3.5rem;margin-bottom:16px;animation:spin 1.8s linear infinite;display:inline-block;">🧸</div>
      <div style="font-size:15px;color:var(--text2);margin-top:8px;">商品載入中，請稍候…</div>
    </div>
    <style>@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}</style>`;
}

// ── 錯誤畫面 ──
function showError(msg) {
  document.getElementById('gallery-section').innerHTML = `
    <div style="max-width:480px;margin:60px auto;text-align:center;padding:40px 24px;background:var(--surface);border:1px solid var(--border);border-radius:16px;">
      <div style="font-size:3rem;margin-bottom:12px;">😢</div>
      <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:8px;">圖片載入失敗</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.7;margin-bottom:20px;">${msg}</div>
      <button onclick="init()" style="padding:10px 28px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;cursor:pointer;font-family:var(--sans);">重試</button>
    </div>`;
  updateHeaderOffset();
}

// ── 主初始化 ──
async function init() {
  showLoading();
  try {
    const [resources, cfg] = await Promise.all([fetchFromCloudinary(), fetchConfig()]);

    PAGE_SIZE = cfg.displayPageSize || 50;
    CARD_MIN  = cfg.displayCardSize || 130;
    document.documentElement.style.setProperty('--card-min', CARD_MIN + 'px');

    const catAssign = {};
    (cfg.productCategories || []).forEach(pc => { catAssign[pc.id] = pc.category; });

    const productMap = {};
    resources.forEach(r => {
      const id = extractId(r.public_id);
      if (!id) return;
      if (!productMap[id] || (r.created_at || '') > (productMap[id].created_at || '')) {
        productMap[id] = {
          id,
          name: (cfg.productNames || {})[id] || id,
          url: r.secure_url || `https://res.cloudinary.com/${CLOUD_NAME}/image/upload/v${r.version}/${r.public_id}.${r.format}`,
          format: r.format || 'jpg',
          category: catAssign[id] || '',
          visible: true,
          created_at: r.created_at || ''
        };
      }
    });

    const sortFn = (a, b) => {
      const am = a.id.match(/^([A-Z]+)(\d+)$/), bm = b.id.match(/^([A-Z]+)(\d+)$/);
      if (!am || !bm) return a.id.localeCompare(b.id);
      if (am[1] !== bm[1]) return am[1].localeCompare(bm[1]);
      return parseInt(am[2]) - parseInt(bm[2]);
    };

    config.products   = Object.values(productMap).sort(sortFn);
    config.categories = cfg.categories || [];

    renderApp();
  } catch(err) {
    document.getElementById('fixed-header').innerHTML = '';
    showError(err.message);
  }
}

// ── 渲染整個 App ──
function renderApp() {
  const cats  = config.categories;
  const total = config.products.length;

  // ── Fixed header（Hero + Search + Categories）──
  document.getElementById('fixed-header').innerHTML = `
    <div class="hero">
      <img class="hero-logo-img" src="LOGO.jpg" alt="三麗鷗中毒日記"
           onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <div style="display:none;align-items:center;justify-content:center;flex-direction:column;padding:24px;background:#fce8ef;min-height:80px;">
        <div style="font-size:22px;font-weight:700;color:var(--accent);">三麗鷗中毒日記</div>
        <div style="font-size:12px;color:var(--text2);margin-top:4px;">每天都被三麗鷗治癒中♡</div>
      </div>
    </div>

    <div class="sticky-bar">
      <div class="sticky-inner">
        <div class="search-wrap">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="搜尋商品編號或名稱…">
        </div>
        <div class="shop-slogan">錢錢沒有不見，只是變成妳愛的樣子 ♡</div>
        <div class="count-info" id="countInfo">共 ${total} 件商品 · 持續更新中 ♡</div>
      </div>
    </div>

    <div class="cat-scroll">
      <div class="cat-inner" id="catTabs">
        <button class="cat-tab active" data-cat="all">全部商品</button>
        ${cats.map(c => `
          <button class="cat-tab" data-cat="${c.id}">
            <span class="cat-dot" style="background:${c.color}"></span>
            ${c.name}
          </button>`).join('')}
      </div>
    </div>`;

  // ── Gallery section ──
  document.getElementById('gallery-section').innerHTML = `
    <div class="gallery-wrap">
      <div class="gallery" id="gallery"></div>
      <div class="load-more-wrap">
        <button id="loadMoreBtn" style="display:none;">載入更多商品</button>
      </div>
    </div>`;

  // 計算 header 高度，讓商品不被蓋住
  updateHeaderOffset();
  // 視窗改變時重新計算
  window.addEventListener('resize', updateHeaderOffset);

  // Events
  document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(window._st);
    window._st = setTimeout(applyFilters, 220);
  });
  document.getElementById('catTabs').addEventListener('click', e => {
    const btn = e.target.closest('.cat-tab');
    if (!btn) return;
    document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCategory = btn.dataset.cat;
    applyFilters();
  });
  document.getElementById('loadMoreBtn').addEventListener('click', renderPage);
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('searchInput')?.value.trim().toLowerCase() || '';
  filtered = config.products.filter(p => {
    const matchCat = activeCategory === 'all' || p.category === activeCategory;
    const matchQ   = !q || p.id.toLowerCase().includes(q) || (p.name || '').toLowerCase().includes(q);
    return matchCat && matchQ && p.visible !== false;
  });
  currentPage = 0;
  const g = document.getElementById('gallery');
  if (g) g.innerHTML = '';
  renderPage();
}

function renderPage() {
  const gallery = document.getElementById('gallery');
  if (!gallery) return;
  const start = currentPage * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);
  const cats  = config.categories;

  if (filtered.length === 0) {
    gallery.innerHTML = `<div class="state-empty"><div class="icon">🔍</div><p>找不到符合條件的商品</p><small>試試其他關鍵字或分類</small></div>`;
    document.getElementById('loadMoreBtn').style.display = 'none';
    const ci = document.getElementById('countInfo');
    if (ci) ci.textContent = '找不到商品';
    return;
  }

  slice.forEach((p, i) => {
    const cat    = cats.find(c => c.id === p.category);
    const imgUrl = buildUrl(p);
    const card   = document.createElement('div');
    card.className = 'card';
    card.dataset.idx = start + i;
    card.innerHTML = `
      <div class="img-wrap">
        <div class="skeleton"></div>
        <img src="${imgUrl}" alt="${p.name || p.id}">
        <div class="overlay"><span class="overlay-hint">點擊放大 🔍</span></div>
      </div>
      <div class="card-info">
        <div class="card-id">No. ${p.id}</div>
        <div class="card-name">${p.name || p.id}</div>
        ${cat
          ? `<span class="card-cat-badge" style="background:${cat.color}18;color:${cat.color};border:1px solid ${cat.color}33;"><span style="width:6px;height:6px;border-radius:50%;background:${cat.color};display:inline-block;margin-right:2px;"></span>${cat.name}</span>`
          : '<span class="card-cat-badge" style="background:var(--surface2);color:var(--text3);">未分類</span>'}
      </div>`;

    const img  = card.querySelector('img');
    const wrap = card.querySelector('.img-wrap');
    const markLoaded = () => wrap.classList.add('img-loaded');
    if (img.complete && img.naturalWidth > 0) markLoaded();
    else img.addEventListener('load', markLoaded);
    img.addEventListener('error', () => {
      wrap.classList.add('img-loaded');
      img.style.display = 'none';
      const ph = document.createElement('div');
      ph.style.cssText = 'width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px;color:var(--text3);font-size:12px;';
      ph.innerHTML = '<span style="font-size:2rem">🧸</span>' + p.id;
      wrap.appendChild(ph);
    });
    card.addEventListener('click', () => openLightbox(start + i));
    gallery.appendChild(card);
  });

  currentPage++;
  const remaining = filtered.length - currentPage * PAGE_SIZE;
  const btn = document.getElementById('loadMoreBtn');
  if (remaining > 0) {
    btn.style.display = 'inline-flex';
    btn.textContent = `載入更多（還有 ${remaining} 件）`;
  } else {
    btn.style.display = 'none';
  }
  const ci = document.getElementById('countInfo');
  if (ci) ci.textContent = filtered.length === config.products.length
    ? `共 ${filtered.length} 件商品 · 持續更新中 ♡`
    : `搜尋結果 ${filtered.length} 件`;
}

// ── Lightbox ──
function openLightbox(index) {
  lbIndex = index; updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}
function updateLightbox() {
  const p = filtered[lbIndex]; if (!p) return;
  const cat = config.categories.find(c => c.id === p.category);
  document.getElementById('lbImg').src           = buildFullUrl(p);
  document.getElementById('lbImg').alt           = p.name || p.id;
  document.getElementById('lbId').textContent    = `No. ${p.id}`;
  document.getElementById('lbName').textContent  = p.name || p.id;
  document.getElementById('lbCat').textContent   = cat ? `✦ ${cat.name}` : '';
  document.getElementById('lbCounter').textContent = `${lbIndex + 1} / ${filtered.length}`;
}
document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lbPrev').addEventListener('click',  () => { lbIndex = (lbIndex - 1 + filtered.length) % filtered.length; updateLightbox(); });
document.getElementById('lbNext').addEventListener('click',  () => { lbIndex = (lbIndex + 1) % filtered.length; updateLightbox(); });
document.getElementById('lightbox').addEventListener('click', e => { if (e.target === document.getElementById('lightbox')) closeLightbox(); });
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft')  { lbIndex = (lbIndex - 1 + filtered.length) % filtered.length; updateLightbox(); }
  if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % filtered.length; updateLightbox(); }
});

// ── Scroll to top ──
window.addEventListener('scroll', () => {
  document.getElementById('toTop').classList.toggle('show', window.scrollY > 300);
});
document.getElementById('toTop').addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

// ── LINE Modal ──
const LINE_URL = 'https://line.me/R/ti/g/6NrgspyX5H';
function openLineModal() {
  document.getElementById('lineModal').classList.add('open');
  document.getElementById('lineJoinBtn').onclick = () => window.open(LINE_URL, '_blank', 'noopener');
}
function closeLineModal(e) {
  if (e.target === document.getElementById('lineModal'))
    document.getElementById('lineModal').classList.remove('open');
}
function closeLineModalDirect() {
  document.getElementById('lineModal').classList.remove('open');
}

// ── Start ──
init();
</script>
