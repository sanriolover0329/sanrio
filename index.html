<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>三麗鷗中毒日記</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono&display=swap');

:root {
  --bg: #fff5f7;
  --surface: #ffffff;
  --surface2: #fff0f3;
  --border: #f0d0da;
  --accent: #e8608a;
  --accent2: #f9b8cb;
  --accent-dark: #c0325c;
  --text: #3a2030;
  --text2: #8a607a;
  --text3: #c0a0b0;
  --radius: 12px;
  --sans: 'Noto Sans TC', sans-serif;
  --serif: 'Playfair Display', serif;
  --mono: 'DM Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── Hero / Logo Banner ── */
.hero {
  background: #fce8ef;
  position: relative;
  overflow: hidden;
  border-bottom: 2px solid #f9b8cb;
}
.hero-logo-img {
  width: 100%;
  height: auto;
  display: block;
  object-fit: contain;
}
.hero-sub-bar {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(8px);
  text-align: center;
  padding: 10px 20px;
  font-size: 13px;
  color: var(--text2);
  border-top: 1px solid var(--border);
}
.hero-sub-bar strong { color: var(--accent); }

/* ── Sticky Header ── */
.sticky-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(255,245,247,0.96);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.sticky-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 28px;
  height: 58px;
  display: flex;
  align-items: center;
  gap: 16px;
}
.search-wrap { flex: 1; max-width: 340px; position: relative; }
.search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text3); pointer-events: none; }
#searchInput {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 12px 8px 34px;
  font-family: var(--sans);
  font-size: 13px;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
#searchInput:focus { border-color: var(--accent); background: #fff; }
#searchInput::placeholder { color: var(--text3); }
.count-info { margin-left: auto; font-family: var(--mono); font-size: 12px; color: var(--text3); white-space: nowrap; }

/* ── Category Tabs ── */
.cat-scroll {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
}
.cat-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 28px;
  display: flex;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.cat-inner::-webkit-scrollbar { display: none; }
.cat-tab {
  flex-shrink: 0;
  padding: 14px 18px;
  font-family: var(--sans);
  font-size: 13px;
  color: var(--text2);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 6px;
}
.cat-tab:hover { color: var(--accent); }
.cat-tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 500; }
.cat-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

/* ── Gallery ── */
.gallery-wrap { max-width: 1400px; margin: 0 auto; padding: 20px 20px 60px; }

.gallery {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(var(--card-min,130px), 1fr));
  gap: 10px;
}

/* ── Product Card ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: visible;
  cursor: pointer;
  position: relative;
  transition: z-index 0s;
}
.card:hover { z-index: 10; }

.img-wrap {
  position: relative;
  overflow: hidden;
  aspect-ratio: 1;
  background: var(--surface2);
  border-radius: 9px 9px 0 0;
}

/* Fix: always visible, no opacity:0 trick */
.img-wrap img {
  width: 100%; height: 100%;
  object-fit: cover;
  display: block;
  transition: transform 0.4s cubic-bezier(0.34,1.2,0.64,1);
}

/* Hover: card lifts AND image zooms */
.card:hover .img-wrap img {
  transform: scale(1.15);
}
.card:hover {
  box-shadow: 0 12px 36px rgba(232,96,138,0.22), 0 0 0 2px var(--accent);
  border-color: var(--accent);
  transform: translateY(-4px) scale(1.06);
  transition: transform 0.3s cubic-bezier(0.34,1.4,0.64,1), box-shadow 0.3s, border-color 0.2s;
}

/* Skeleton shimmer */
.skeleton {
  position: absolute; inset: 0;
  background: linear-gradient(90deg, var(--surface2) 25%, #ffe0ea 50%, var(--surface2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
  border-radius: 9px 9px 0 0;
}
.img-loaded .skeleton { display: none; }
@keyframes shimmer { 0%{background-position:200%} 100%{background-position:-200%} }

/* Hover overlay with zoom icon */
.overlay {
  position: absolute; inset: 0;
  background: linear-gradient(to top, rgba(200,50,100,0.55) 0%, transparent 60%);
  opacity: 0;
  transition: opacity 0.2s;
  display: flex; align-items: flex-end; justify-content: center;
  padding-bottom: 8px;
  border-radius: 9px 9px 0 0;
}
.card:hover .overlay { opacity: 1; }
.overlay-hint {
  background: rgba(255,255,255,0.9);
  border-radius: 20px;
  padding: 3px 10px;
  font-size: 11px;
  color: var(--accent-dark);
  font-weight: 500;
  pointer-events: none;
}

.card-info { padding: 6px 8px 8px; }
.card-id { font-family: var(--mono); font-size: 9px; color: var(--text3); }
.card-name { font-size: 11px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 1px 0 4px; color: var(--text); }
.card-cat-badge {
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 9px; padding: 1px 6px; border-radius: 4px; font-weight: 500;
}

/* ── Empty / Error State ── */
.state-empty {
  grid-column: 1/-1;
  text-align: center;
  padding: 80px 20px;
  color: var(--text3);
}
.state-empty .icon { font-size: 3rem; margin-bottom: 12px; }
.state-empty p { font-size: 14px; margin-bottom: 6px; }
.state-empty small { font-size: 12px; }

/* ── Load More ── */
.load-more-wrap { text-align: center; margin-top: 32px; }
#loadMoreBtn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 12px 36px;
  background: transparent;
  border: 1.5px solid var(--accent);
  border-radius: 8px;
  color: var(--accent);
  font-family: var(--sans);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}
#loadMoreBtn:hover { background: var(--accent); color: #fff; }
#loadMoreBtn:disabled { opacity: 0.35; cursor: default; }

/* ── Lightbox ── */
#lightbox {
  display: none;
  position: fixed; inset: 0; z-index: 1000;
  background: rgba(20,16,14,0.96);
  backdrop-filter: blur(10px);
  align-items: center; justify-content: center;
}
#lightbox.open { display: flex; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

.lb-wrap {
  position: relative;
  max-width: min(88vw, 860px);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
}
#lbImg {
  max-width: 100%;
  max-height: 72vh;
  object-fit: contain;
  border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
  animation: zoomIn 0.28s cubic-bezier(0.34,1.56,0.64,1);
}
@keyframes zoomIn { from{transform:scale(0.88);opacity:0} to{transform:scale(1);opacity:1} }

.lb-info { text-align: center; }
.lb-id { font-family: var(--mono); font-size: 11px; color: rgba(255,255,255,0.3); margin-bottom: 4px; }
.lb-name { font-family: var(--serif); font-size: 1.3rem; color: #f5f0ea; margin-bottom: 4px; }
.lb-cat { font-size: 12px; color: var(--accent2); letter-spacing: 0.06em; }

.lb-counter {
  position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
  font-family: var(--mono); font-size: 12px;
  color: rgba(255,255,255,0.35);
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px; padding: 4px 14px;
}

.lb-nav {
  position: fixed; top: 50%; transform: translateY(-50%);
  width: 46px; height: 46px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: #fff; font-size: 20px;
  transition: all 0.18s;
  backdrop-filter: blur(4px);
}
.lb-nav:hover { background: var(--accent); border-color: var(--accent); }
#lbPrev { left: 20px; }
#lbNext { right: 20px; }

.lb-close {
  position: fixed; top: 18px; right: 20px;
  width: 38px; height: 38px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: #fff; font-size: 20px;
  transition: background 0.15s;
}
.lb-close:hover { background: #c04040; border-color: #c04040; }

/* ── No Config Banner ── */
.no-config {
  max-width: 500px;
  margin: 80px auto;
  text-align: center;
  padding: 48px 32px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
}
.no-config .icon { font-size: 3rem; margin-bottom: 16px; }
.no-config h2 { font-family: var(--serif); font-size: 1.5rem; margin-bottom: 8px; }
.no-config p { font-size: 13px; color: var(--text2); margin-bottom: 20px; line-height: 1.7; }
.no-config a {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 11px 24px; background: var(--accent); color: #fff;
  border-radius: 8px; font-size: 13px; font-weight: 500;
  text-decoration: none; transition: background 0.15s;
}
.no-config a:hover { background: var(--accent-dark); }

/* ── Admin link ── */
.admin-link {
  position: fixed; bottom: 20px; right: 20px;
  background: var(--text); color: rgba(255,255,255,0.6);
  font-size: 11px; font-family: var(--mono);
  padding: 7px 12px; border-radius: 7px;
  text-decoration: none;
  transition: color 0.15s;
  z-index: 50;
}
.admin-link:hover { color: #fff; }

/* ── Scroll to top ── */
#toTop {
  position: fixed; bottom: 20px; right: 80px;
  width: 40px; height: 40px;
  background: var(--accent); border: none; border-radius: 50%;
  color: #fff; font-size: 18px; cursor: pointer;
  opacity: 0; pointer-events: none;
  transition: opacity 0.25s;
  display: flex; align-items: center; justify-content: center;
  z-index: 50;
}
#toTop.show { opacity: 1; pointer-events: all; }

@media (max-width: 600px) {
  .hero { padding: 40px 20px 36px; }
  .sticky-inner, .cat-inner, .gallery-wrap { padding-left: 16px; padding-right: 16px; }
  .gallery { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  #lbPrev { left: 8px; }
  #lbNext { right: 8px; }
}
</style>
</head>
<body>

<div id="app">
  <!-- Injected by JS -->
</div>

<!-- Lightbox -->
<div id="lightbox" role="dialog" aria-modal="true">
  <div class="lb-counter" id="lbCounter"></div>
  <div class="lb-wrap">
    <img id="lbImg" src="" alt="">
    <div class="lb-info">
      <div class="lb-id" id="lbId"></div>
      <div class="lb-name" id="lbName"></div>
      <div class="lb-cat" id="lbCat"></div>
    </div>
  </div>
  <button class="lb-nav" id="lbPrev">&#8592;</button>
  <button class="lb-nav" id="lbNext">&#8594;</button>
  <button class="lb-close" id="lbClose">&#215;</button>
</div>

<a href="admin.html" class="admin-link">⚙ 後台</a>
<button id="toTop" aria-label="回頂部">↑</button>

<script>
// ── Load config from localStorage (set by admin.html) ──
function loadConfig() {
  try {
    const raw = localStorage.getItem('doll_shop_frontend');
    return raw ? JSON.parse(raw) : null;
  } catch(e) { return null; }
}

let PAGE_SIZE = 24; // overridden by config
let config = null;
let filtered = [];
let currentPage = 0;
let lbIndex = 0;
let activeCategory = 'all';

// ── Build image URL ──
// Uses actual URL stored from Cloudinary API (includes version + correct filename)
function buildUrl(product) {
  if (product.url) {
    const sz = config.thumbSize || 500;
    return product.url.replace('/image/upload/', `/image/upload/w_${sz},h_${sz},c_fill,q_auto,f_auto/`);
  }
  return '';
}

function buildFullUrl(product) {
  if (product.url) {
    return product.url.replace('/image/upload/', '/image/upload/w_1200,h_1200,c_fill,q_auto,f_auto/');
  }
  return '';
}

// ── Render app ──
function renderApp() {
  config = loadConfig();
  const app = document.getElementById('app');

  if (!config || !config.cloudName) {
    app.innerHTML = `
      <div style="padding:20px;">
        <div class="no-config">
          <div class="icon">⚙️</div>
          <h2>尚未完成設定</h2>
          <p>請先前往後台管理介面，填入 Cloudinary 設定並建立分類，再回來瀏覽商品。</p>
          <a href="admin.html">前往後台設定 →</a>
        </div>
      </div>`;
    return;
  }

  const cats = config.categories || [];
  const products = config.products || [];

  // Apply display settings from config
  PAGE_SIZE = config.displayPageSize || 24;
  const cardMin = config.displayCardSize || 130;
  document.documentElement.style.setProperty('--card-min', cardMin + 'px');

  app.innerHTML = `
    <div class="hero">
      <img class="hero-logo-img" src="LOGO.jpg" alt="三麗鷗中毒日記"
           onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
      <div style="display:none;padding:32px;text-align:center;background:#fce8ef;">
        <div style="font-size:2rem;">🧸</div>
        <div style="font-size:22px;font-weight:700;color:var(--accent);margin-top:8px;">三麗鷗中毒日記</div>
        <div style="font-size:13px;color:var(--text2);margin-top:4px;">每天都被三麗鷗治癒中♡</div>
      </div>
      <div class="hero-sub-bar">
        共 <strong>${products.filter(p=>p.visible!==false).length}</strong> 件商品 · 持續更新中 ♡
      </div>
    </div>

    <div class="sticky-bar">
      <div class="sticky-inner">
        <div class="search-wrap">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input type="text" id="searchInput" placeholder="搜尋商品編號或名稱…">
        </div>
        <div class="count-info" id="countInfo"></div>
      </div>
    </div>

    <div class="cat-scroll">
      <div class="cat-inner" id="catTabs">
        <button class="cat-tab active" data-cat="all">
          全部商品
        </button>
        ${cats.map(c => `
          <button class="cat-tab" data-cat="${c.id}">
            <span class="cat-dot" style="background:${c.color}"></span>
            ${c.name}
          </button>
        `).join('')}
      </div>
    </div>

    <div class="gallery-wrap">
      <div class="gallery" id="gallery"></div>
      <div class="load-more-wrap">
        <button id="loadMoreBtn" style="display:none;">載入更多商品</button>
      </div>
    </div>
  `;

  // Events
  document.getElementById('searchInput').addEventListener('input', () => {
    clearTimeout(window._st);
    window._st = setTimeout(applyFilters, 220);
  });

  document.getElementById('catTabs').addEventListener('click', e => {
    const btn = e.target.closest('.cat-tab');
    if (!btn) return;
    document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeCategory = btn.dataset.cat;
    applyFilters();
  });

  document.getElementById('loadMoreBtn').addEventListener('click', renderPage);

  applyFilters();
}

function applyFilters() {
  const products = (config.products || []).filter(p => p.visible !== false);
  const q = document.getElementById('searchInput')?.value.trim().toLowerCase() || '';
  filtered = products.filter(p => {
    const matchCat = activeCategory === 'all' || p.category === activeCategory;
    const matchQ = !q || p.id.toLowerCase().includes(q) || (p.name||'').toLowerCase().includes(q);
    return matchCat && matchQ;
  });
  currentPage = 0;
  document.getElementById('gallery').innerHTML = '';
  renderPage();
}

function renderPage() {
  const gallery = document.getElementById('gallery');
  const start = currentPage * PAGE_SIZE;
  const slice = filtered.slice(start, start + PAGE_SIZE);

  const cats = config.categories || [];

  if (filtered.length === 0) {
    gallery.innerHTML = `
      <div class="state-empty">
        <div class="icon">🔍</div>
        <p>找不到符合條件的商品</p>
        <small>試試其他關鍵字或分類</small>
      </div>`;
    document.getElementById('loadMoreBtn').style.display = 'none';
    document.getElementById('countInfo').textContent = '0 件商品';
    return;
  }

  slice.forEach((p, i) => {
    const cat = cats.find(c => c.id === p.category);
    const imgUrl = buildUrl(p);
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.idx = start + i;
    card.innerHTML = `
      <div class="img-wrap">
        <div class="skeleton"></div>
        <img src="${imgUrl}" alt="${p.name || p.id}">
        <div class="overlay"><span class="overlay-hint">點擊放大 🔍</span></div>
      </div>
      <div class="card-info">
        <div class="card-id">No. ${p.id}</div>
        <div class="card-name">${p.name || p.id}</div>
        ${cat
          ? `<span class="card-cat-badge" style="background:${cat.color}18;color:${cat.color};border:1px solid ${cat.color}33;">
               <span style="width:6px;height:6px;border-radius:50%;background:${cat.color};display:inline-block;"></span>
               ${cat.name}
             </span>`
          : '<span class="card-cat-badge" style="background:var(--surface2);color:var(--text3);">未分類</span>'
        }
      </div>`;

    const img = card.querySelector('img');
    const wrap = card.querySelector('.img-wrap');
    // Fix: also check if already loaded (cached images)
    const markLoaded = () => wrap.classList.add('img-loaded');
    if (img.complete && img.naturalWidth > 0) {
      markLoaded();
    } else {
      img.addEventListener('load', markLoaded);
    }
    img.addEventListener('error', () => {
      wrap.classList.add('img-loaded');
      img.style.display = 'none';
      const placeholder = document.createElement('div');
      placeholder.style.cssText = 'width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:13px;font-family:var(--mono);flex-direction:column;gap:4px;';
      placeholder.innerHTML = `<span style="font-size:2rem">🧸</span><span>${p.id}</span>`;
      wrap.appendChild(placeholder);
    });

    card.addEventListener('click', () => openLightbox(start + i));
    gallery.appendChild(card);
  });

  currentPage++;
  const shown = currentPage * PAGE_SIZE;
  const remaining = filtered.length - shown;
  const btn = document.getElementById('loadMoreBtn');
  btn.style.display = remaining > 0 ? 'inline-flex' : 'none';
  if (remaining > 0) btn.textContent = `載入更多（還有 ${remaining} 件）`;
  document.getElementById('countInfo').textContent = `${filtered.length} 件商品`;
}

// ── Lightbox ──
function openLightbox(index) {
  lbIndex = index;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.body.style.overflow = '';
}

function updateLightbox() {
  const p = filtered[lbIndex];
  if (!p) return;
  const cat = (config.categories || []).find(c => c.id === p.category);
  document.getElementById('lbImg').src = buildFullUrl(p);
  document.getElementById('lbImg').alt = p.name || p.id;
  document.getElementById('lbId').textContent = `No. ${p.id}`;
  document.getElementById('lbName').textContent = p.name || p.id;
  document.getElementById('lbCat').textContent = cat ? `✦ ${cat.name}` : '';
  document.getElementById('lbCounter').textContent = `${lbIndex + 1} / ${filtered.length}`;
}

document.getElementById('lbClose').addEventListener('click', closeLightbox);
document.getElementById('lbPrev').addEventListener('click', () => {
  lbIndex = (lbIndex - 1 + filtered.length) % filtered.length;
  updateLightbox();
});
document.getElementById('lbNext').addEventListener('click', () => {
  lbIndex = (lbIndex + 1) % filtered.length;
  updateLightbox();
});
document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
});
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape') closeLightbox();
  if (e.key === 'ArrowLeft') { lbIndex = (lbIndex - 1 + filtered.length) % filtered.length; updateLightbox(); }
  if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % filtered.length; updateLightbox(); }
});

// ── Scroll to top ──
window.addEventListener('scroll', () => {
  document.getElementById('toTop').classList.toggle('show', window.scrollY > 500);
});
document.getElementById('toTop').addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

// ── Init ──
